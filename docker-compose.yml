services:
  familytree-db:
    image: postgres:15
    container_name: ft_postgres
    restart: always
    environment:
      POSTGRES_DB: familytree
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser -d familytree"]
      interval: 5s
      timeout: 5s
      retries: 5

  familytree-backend:
    build: ./familytree-backend
    container_name: ft_backend
    restart: always
    # миграции гоняются при каждом старте контейнера — на этапе build ещё нет доступа к БД
    command: sh -c "python manage.py migrate --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    # SECRET_KEY/DEBUG и остальное берутся из familytree-backend/.env (см. SETUP_LOCAL.md);
    # DB_*/ALLOWED_HOSTS ниже переопределяют его же значения — .env настроен под локальный
    # Postgres на localhost, а тут бэкенд должен идти в контейнер familytree-db
    env_file:
      - ./familytree-backend/.env
    environment:
      DB_NAME: familytree
      DB_USER: devuser
      DB_PASSWORD: devpassword
      DB_HOST: familytree-db
      DB_PORT: 5432
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,familytree-backend,familytree-frontend}
    ports:
      - "8000:8000"
    volumes:
      - media_data:/app/media
    depends_on:
      familytree-db:
        condition: service_healthy

  familytree-frontend:
    build: ./familytree-frontend
    container_name: ft_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - familytree-backend

volumes:
  postgres_data:
  media_data:
