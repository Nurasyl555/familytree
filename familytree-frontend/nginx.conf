server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # тот же контракт, что и у Vite dev-прокси (vite.config.js) — client.js ходит на
    # относительный /api, поэтому в проде достаточно проксировать эти два префикса
    location /api/ {
        proxy_pass http://backend:8000;
        # $host обрезает порт из Host-заголовка (в отличие от $http_host) — из-за этого
        # Django строил абсолютные URL фото как "http://localhost/media/..." без порта,
        # и картинки не грузились (браузер стучался в 80-й порт, а не в реальный).
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /media/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $http_host;
    }

    # SPA: неизвестные пути отдаём в index.html, react-router сам разберёт маршрут
    location / {
        try_files $uri $uri/ /index.html;
    }
}
